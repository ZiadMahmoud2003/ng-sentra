# NG-SENTRA Nginx Configuration
# HTTPS/SSL Reverse Proxy with Security Headers for SOC Dashboard

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name _;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # SSL Certificate Configuration
    # Replace with your actual certificate paths
    ssl_certificate     /etc/nginx/ssl/ng-sentra.crt;
    ssl_certificate_key /etc/nginx/ssl/ng-sentra.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security Headers ─────────────────────────────────────────────────────
    # HSTS - enforce HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent clickjacking - allow iframes only from same origin and SOC components
    # NOTE: For iframe embedding of backend components, use Content-Security-Policy frame-src
    # rather than X-Frame-Options DENY, to allow specific component URLs
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Content Security Policy
    # frame-src allows embedding of backend SOC components by their IP/port
    # Adjust the frame-src directive to include your actual component URLs
    # NOTE: CSP frame-src must use explicit hostnames/IPs, not CIDR ranges.
    # Add each SOC component host explicitly below.
    # Example: http://192.168.1.10:443 http://192.168.1.20:8080
    # The wildcard http: allows any HTTP source — restrict to specific IPs in production.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: ws:; frame-src 'self' http://localhost:* https://localhost:* http:; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ─── Proxy to NG-SENTRA App ───────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for real-time updates
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}

# ─── SSL Certificate Generation Instructions ──────────────────────────────────
# For self-signed certificate (development/internal use):
#
# mkdir -p /etc/nginx/ssl
# openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#   -keyout /etc/nginx/ssl/ng-sentra.key \
#   -out /etc/nginx/ssl/ng-sentra.crt \
#   -subj "/C=US/ST=State/L=City/O=NG-SENTRA SOC/CN=ng-sentra.local"
#
# For Let's Encrypt (if publicly accessible):
# certbot --nginx -d your-domain.com
